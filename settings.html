<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 - 個人健身追蹤器</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .settings-section {
            margin-bottom: 2rem;
        }

        .settings-section h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-section h2 .icon {
            font-size: 1.4rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .form-group .hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            opacity: 0.7;
        }

        .radio-row {
            display: flex;
            gap: 16px;
            padding: 10px 0;
        }

        .radio-row label {
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 400;
        }

        .action-bar {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-wrap: wrap;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            box-shadow: none;
        }

        .btn-danger {
            background-color: var(--danger-color);
        }

        .btn-danger:hover {
            background-color: #dc2626;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .btn-success {
            background-color: var(--success-color);
        }

        .btn-success:hover {
            background-color: var(--success-light);
            box-shadow: var(--glow-success);
        }

        .current-plan-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .plan-stat {
            text-align: center;
            border-top: 4px solid var(--primary-color);
        }

        .plan-stat h4 {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .plan-stat .value {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0.4rem 0;
            color: var(--primary-color);
            text-shadow: var(--glow-primary);
        }

        .plan-stat .sub {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .data-management {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .setup-banner {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.15), rgba(34, 197, 94, 0.1));
            border: 1px solid var(--primary-color);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .setup-banner h2 {
            border: none;
            justify-content: center;
            margin-bottom: 0.5rem;
            padding-bottom: 0;
        }

        .setup-banner p {
            color: var(--text-muted);
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>個人健身追蹤器</h1>
        <nav>
            <a href="index.html">數據追蹤</a>
            <a href="workout.html">今日課表</a>
            <a href="diet.html">飲食紀錄</a>
            <a href="fasting.html">間歇性斷食</a>
            <a href="share.html">分享與成果</a>
            <a href="settings.html" class="active">設定</a>
        </nav>

        <div id="setup-banner" class="setup-banner" style="display: none;">
            <h2>歡迎回來！重新開始你的健身計畫</h2>
            <p>請填寫以下資料來設定你的監控計畫</p>
        </div>

        <!-- 當前計畫總覽 -->
        <div id="plan-summary" class="current-plan-summary"></div>

        <!-- 個人資料 -->
        <div class="settings-section card">
            <h2><span class="icon">👤</span>個人資料</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="s-nickname">暱稱</label>
                    <input type="text" id="s-nickname" placeholder="你的名字">
                </div>
                <div class="form-group">
                    <label>性別</label>
                    <div class="radio-row">
                        <label><input type="radio" name="s-gender" value="male" checked> 男</label>
                        <label><input type="radio" name="s-gender" value="female"> 女</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="s-birth-year">出生年</label>
                    <input type="number" id="s-birth-year" placeholder="1994" min="1940" max="2020">
                </div>
                <div class="form-group">
                    <label for="s-height">身高 (cm)</label>
                    <input type="number" id="s-height" step="0.1" placeholder="175">
                </div>
            </div>
        </div>

        <!-- 目標設定 -->
        <div class="settings-section card">
            <h2><span class="icon">🎯</span>目標設定</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="s-start-weight">起始體重 (kg)</label>
                    <input type="number" id="s-start-weight" step="0.1" placeholder="80.0">
                    <span class="hint">計畫開始時的體重</span>
                </div>
                <div class="form-group">
                    <label for="s-start-bodyfat">起始體脂 (%)</label>
                    <input type="number" id="s-start-bodyfat" step="0.1" placeholder="25.0">
                    <span class="hint">計畫開始時的體脂率</span>
                </div>
                <div class="form-group">
                    <label for="s-target-weight">目標體重 (kg)</label>
                    <input type="number" id="s-target-weight" step="0.1" placeholder="70.0">
                </div>
                <div class="form-group">
                    <label for="s-target-bodyfat">目標體脂 (%)</label>
                    <input type="number" id="s-target-bodyfat" step="0.1" placeholder="18.0">
                </div>
            </div>
        </div>

        <!-- 挑戰計畫 -->
        <div class="settings-section card">
            <h2><span class="icon">📅</span>挑戰計畫</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="s-challenge-start">計畫開始日期</label>
                    <input type="date" id="s-challenge-start">
                </div>
                <div class="form-group">
                    <label for="s-challenge-days">計畫天數</label>
                    <input type="number" id="s-challenge-days" placeholder="90" min="7" max="365">
                    <span class="hint">建議 30 ~ 180 天</span>
                </div>
            </div>
        </div>

        <!-- 營養目標 -->
        <div class="settings-section card">
            <h2><span class="icon">🥗</span>每日營養目標</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="s-calorie-target">熱量 (kcal)</label>
                    <input type="number" id="s-calorie-target" placeholder="2000">
                </div>
                <div class="form-group">
                    <label for="s-protein-target">蛋白質 (g)</label>
                    <input type="number" id="s-protein-target" placeholder="150">
                </div>
                <div class="form-group">
                    <label for="s-carb-target">碳水化合物 (g)</label>
                    <input type="number" id="s-carb-target" placeholder="200">
                </div>
                <div class="form-group">
                    <label for="s-fat-target">脂肪 (g)</label>
                    <input type="number" id="s-fat-target" placeholder="60">
                </div>
            </div>
        </div>

        <!-- 資料管理 -->
        <div class="settings-section card">
            <h2><span class="icon">💾</span>資料管理</h2>
            <p style="color: var(--text-muted); margin-top: 0;">所有資料儲存在此裝置的瀏覽器中。建議定期備份以防資料遺失。</p>
            <div class="data-management">
                <button class="btn-secondary" onclick="exportData()">匯出備份</button>
                <div class="file-input-wrapper">
                    <button class="btn-secondary">匯入備份</button>
                    <input type="file" accept=".json" onchange="importData(event)">
                </div>
                <button class="btn-danger" onclick="clearAllData()">清除所有資料</button>
            </div>
        </div>

        <!-- 儲存按鈕 -->
        <div class="action-bar">
            <button class="btn-success" onclick="saveAllSettings()" style="padding: 14px 40px; font-size: 1.1rem;">
                儲存設定
            </button>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
        function loadSettingsToForm() {
            const s = Storage.getSettings();

            document.getElementById('s-nickname').value = s.nickname || '';
            document.querySelector(`input[name="s-gender"][value="${s.gender || 'male'}"]`).checked = true;
            document.getElementById('s-birth-year').value = s.birthYear || '';
            document.getElementById('s-height').value = s.heightCm || '';
            document.getElementById('s-start-weight').value = s.startWeight || '';
            document.getElementById('s-start-bodyfat').value = s.startBodyfat || '';
            document.getElementById('s-target-weight').value = s.targetWeight || '';
            document.getElementById('s-target-bodyfat').value = s.targetBodyfat || '';
            document.getElementById('s-challenge-start').value = s.challengeStartDate || '';
            document.getElementById('s-challenge-days').value = s.challengeDays || '';
            document.getElementById('s-calorie-target').value = s.dailyCalorieTarget || '';
            document.getElementById('s-protein-target').value = s.proteinTarget || '';
            document.getElementById('s-carb-target').value = s.carbTarget || '';
            document.getElementById('s-fat-target').value = s.fatTarget || '';

            renderPlanSummary(s);

            // 如果還沒完成設定，顯示歡迎橫幅
            if (!Storage.hasCompletedSetup()) {
                document.getElementById('setup-banner').style.display = 'block';
            }
        }

        function renderPlanSummary(s) {
            const container = document.getElementById('plan-summary');

            if (!Storage.hasCompletedSetup()) {
                container.innerHTML = '';
                return;
            }

            const today = new Date();
            const startDate = new Date(s.challengeStartDate + 'T00:00:00');
            const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            const remainDays = Math.max(0, s.challengeDays - diffDays);
            const weightDiff = (s.startWeight - s.targetWeight).toFixed(1);

            container.innerHTML = `
                <div class="plan-stat card">
                    <h4>計畫進度</h4>
                    <div class="value">${Math.min(diffDays, s.challengeDays)} / ${s.challengeDays}</div>
                    <div class="sub">剩餘 ${remainDays} 天</div>
                </div>
                <div class="plan-stat card">
                    <h4>起始體重</h4>
                    <div class="value">${s.startWeight} kg</div>
                    <div class="sub">體脂 ${s.startBodyfat}%</div>
                </div>
                <div class="plan-stat card">
                    <h4>目標體重</h4>
                    <div class="value">${s.targetWeight} kg</div>
                    <div class="sub">需減 ${weightDiff} kg</div>
                </div>
                <div class="plan-stat card">
                    <h4>每日熱量</h4>
                    <div class="value">${s.dailyCalorieTarget}</div>
                    <div class="sub">kcal 目標</div>
                </div>
            `;
        }

        function saveAllSettings() {
            const settings = {
                nickname: document.getElementById('s-nickname').value.trim(),
                gender: document.querySelector('input[name="s-gender"]:checked').value,
                birthYear: parseInt(document.getElementById('s-birth-year').value) || 1994,
                heightCm: parseFloat(document.getElementById('s-height').value) || 175,
                startWeight: parseFloat(document.getElementById('s-start-weight').value) || 80,
                startBodyfat: parseFloat(document.getElementById('s-start-bodyfat').value) || 25,
                targetWeight: parseFloat(document.getElementById('s-target-weight').value) || 70,
                targetBodyfat: parseFloat(document.getElementById('s-target-bodyfat').value) || 18,
                challengeDays: parseInt(document.getElementById('s-challenge-days').value) || 90,
                challengeStartDate: document.getElementById('s-challenge-start').value || new Date().toISOString().split('T')[0],
                dailyCalorieTarget: parseInt(document.getElementById('s-calorie-target').value) || 2000,
                proteinTarget: parseInt(document.getElementById('s-protein-target').value) || 150,
                carbTarget: parseInt(document.getElementById('s-carb-target').value) || 200,
                fatTarget: parseInt(document.getElementById('s-fat-target').value) || 60
            };

            Storage.saveSettings(settings);
            Storage.markSetupCompleted();

            document.getElementById('setup-banner').style.display = 'none';
            renderPlanSummary(settings);
            alert('設定已儲存！');
        }

        function exportData() {
            const allData = Storage.exportAll();
            const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fitness-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!confirm('匯入將會覆蓋現有資料，確定要繼續嗎？')) return;
                    Storage.importAll(data);
                    Storage.markSetupCompleted();
                    alert('資料匯入成功！');
                    loadSettingsToForm();
                } catch (err) {
                    alert('檔案格式錯誤，請選擇正確的備份檔。');
                }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (!confirm('確定要清除所有資料嗎？此操作無法復原！')) return;
            if (!confirm('再次確認：所有健身紀錄、飲食紀錄、斷食紀錄都將被刪除。')) return;

            localStorage.clear();
            alert('所有資料已清除。');
            loadSettingsToForm();
        }

        document.addEventListener('DOMContentLoaded', loadSettingsToForm);
    </script>
</body>

</html>
