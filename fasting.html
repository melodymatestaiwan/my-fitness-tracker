<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>間歇性斷食 - 個人健身追蹤器</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* Specific tweaks for fasting.html */
        .fasting-modes {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-weight: 600;
        }

        .mode-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        .mode-btn:hover:not(.active) {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .timer-display {
            text-align: center;
            margin: 30px 0;
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
        }

        .circular-progress {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circular-progress circle {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
        }

        .progress-bg {
            stroke: rgba(255, 255, 255, 0.1);
        }

        .progress-value {
            stroke: var(--primary-color);
            filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.6));
            transition: stroke-dashoffset 1s linear;
        }

        .timer-text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #time-left {
            font-size: 3.5rem;
            font-weight: bold;
            font-family: 'Barlow Condensed', sans-serif;
            color: var(--text-primary);
            text-shadow: var(--shadow-soft);
            margin: 0;
            line-height: 1;
        }

        #fasting-status-label {
            font-size: 1.1rem;
            color: var(--primary-light);
            margin-top: 10px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        #start-btn {
            font-size: 1.2rem;
            padding: 12px 30px;
            border-radius: 30px;
        }

        #stop-btn {
            font-size: 1.2rem;
            padding: 12px 30px;
            border-radius: 30px;
            background-color: transparent;
            border: 2px solid var(--danger-color);
            color: var(--danger-color);
        }

        #stop-btn:hover:not(:disabled) {
            background-color: var(--danger-color);
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none !important;
            transform: none !important;
        }

        .dashboard-grid {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .info-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        #motivation-box,
        #advice-box {
            background: rgba(34, 197, 94, 0.1);
            border-left: 4px solid var(--success-color);
            padding: 15px;
            border-radius: var(--border-radius-sm);
            margin-bottom: 20px;
            line-height: 1.6;
            color: var(--text-primary);
        }

        #advice-box {
            background: rgba(249, 115, 22, 0.1);
            border-left-color: var(--primary-color);
        }

        .history-section {
            margin-top: 40px;
        }

        .history-list {
            list-style: none;
            padding: 0;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition-smooth);
        }

        .history-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .history-date {
            font-weight: bold;
            color: var(--text-primary);
        }

        .history-duration {
            font-weight: bold;
            color: var(--success-light);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-surface);
            padding: 25px;
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal h3 {
            margin-top: 0;
            color: var(--text-primary);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-cancel:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>個人健身追蹤器</h1>
        <nav>
            <a href="index.html">數據追蹤</a>
            <a href="workout.html">今日課表</a>
            <a href="diet.html">飲食紀錄</a>
            <a href="fasting.html" class="active">間歇性斷食</a>
            <a href="share.html">分享與成果</a>
            <a href="settings.html">設定</a>
        </nav>

        <h2 style="text-align: center; margin-bottom: 2rem;">斷食教練</h2>

        <div class="fasting-modes" id="mode-selector-buttons">
            <button class="mode-btn active" data-mode="16:8" onclick="selectMode('16:8')">16:8</button>
            <button class="mode-btn" data-mode="18:6" onclick="selectMode('18:6')">18:6</button>
            <button class="mode-btn" data-mode="20:4" onclick="selectMode('20:4')">20:4</button>
            <button class="mode-btn" data-mode="14:10" onclick="selectMode('14:10')">14:10</button>
        </div>
        <!-- Hidden select to keep existing JS logic perfectly intact -->
        <select id="fasting-mode" style="display: none;" onchange="updateMode()">
            <option value="16:8">16:8</option>
            <option value="18:6">18:6</option>
            <option value="20:4">20:4</option>
            <option value="14:10">14:10</option>
        </select>

        <div class="timer-display">
            <svg class="circular-progress" viewBox="0 0 100 100">
                <circle class="progress-bg" cx="50" cy="50" r="44" />
                <circle class="progress-value" id="progress-ring" cx="50" cy="50" r="44" stroke-dasharray="276"
                    stroke-dashoffset="0" />
            </svg>
            <div class="timer-text-container">
                <div id="status-text" style="display: none;"></div><!-- Hidden but kept for JS -->
                <div id="countdown-timer">00:00:00</div>
                <div id="fasting-status-label">準備開始</div>
                <div id="time-info" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">起訖時間</div>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" onclick="startFasting()">開始斷食</button>
            <button id="stop-btn" onclick="stopFasting()" style="display:none;">結束/放縱</button>
            <button onclick="editTime()"
                style="background: transparent; border: 1px solid var(--primary-light); color: var(--text-primary);">調整時間</button>
        </div>

        <div class="dashboard-grid">
            <div class="info-card">
                <div class="info-label">目標斷食</div>
                <div class="info-value" id="goal-target-display">16 小時</div>
            </div>
            <div class="info-card" style="border-top-color: var(--success-color);">
                <div class="info-label">本週達成</div>
                <div class="info-value" id="weekly-success-display">0 次</div>
            </div>
        </div>

        <!-- AI 控制區塊 -->
        <div style="margin-top: 2rem;">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="fasting-goal-input" placeholder="輸入今日斷食目標 (如: 專注, 燃脂)"
                    style="flex:1; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: var(--border-radius-sm);">
                <button id="motivation-btn" onclick="getMotivation()"
                    style="background-color: var(--success-color); white-space: nowrap;">✨ 教練策略</button>
            </div>
            <div id="motivation-box" style="display: none;"></div>

            <button id="advice-btn" onclick="getFastingAdvice()" style="width: 100%; margin-bottom: 15px;">✨
                獲取破戒建議</button>
            <div id="advice-box" style="display: none;"></div>
        </div>

        <div class="history-section">
            <h3 style="border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; display: inline-block;">
                歷史斷食紀錄</h3>
            <ul class="history-list" id="history-tbody">
                <li class="history-item">
                    <div style="color: var(--text-muted); text-align: center; width: 100%;">尚無紀錄...</div>
                </li>
            </ul>
        </div>
    </div>
    <script src="storage.js"></script>
    <script>
        // --- Configuration ---
        const TIME_OFFSET = 8 * 60 * 60 * 1000; // TW time zone offset (UTC+8)
        const modes = {
            '16:8': { fast: 16, eat: 8, name: '16小時斷食' },
            '18:6': { fast: 18, eat: 6, name: '18小時斷食' },
            '20:4': { fast: 20, eat: 4, name: '20小時斷食' },
            '14:10': { fast: 14, eat: 10, name: '14小時斷食' }
        };

        // --- State Management ---
        let timerInterval;
        let isFasting = false;
        let startTime = null;
        let targetEndTime = null;
        let fastingHistory = [];
        let currentMode = '16:8';

        // --- DOM Elements ---
        const timerDisplay = document.getElementById('countdown-timer');
        const statusText = document.getElementById('status-text'); // Hidden but kept for logic if needed
        const fastingStatusLabel = document.getElementById('fasting-status-label');
        const timeInfo = document.getElementById('time-info');
        const progressRing = document.getElementById('progress-ring');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const historyTbody = document.getElementById('history-tbody');
        const motivationOutputEl = document.getElementById('motivation-box');
        const adviceOutputEl = document.getElementById('advice-box');
        const goalInputEl = document.getElementById('fasting-goal-input');

        // SVG Circle Setup
        const radius = progressRing.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
        progressRing.style.strokeDashoffset = circumference;

        function setProgress(percent) {
            const offset = circumference - percent / 100 * circumference;
            progressRing.style.strokeDashoffset = offset;
        }

        // --- Initialization ---
        function init() {
            try {
                const data = loadData();
                if (data && data.fastingHistory) {
                    fastingHistory = data.fastingHistory;
                }
                if (data && data.fastingState) {
                    const state = data.fastingState;
                    if (state.isFasting && state.startTime && state.targetEndTime) {
                        isFasting = true;
                        startTime = state.startTime;
                        targetEndTime = state.targetEndTime;
                        currentMode = state.mode || '16:8';
                        selectMode(currentMode, false); // Update UI without triggering alert
                        startTimerUI();
                    }
                }
                updateHistoryUI();
                updateDashboardStats();
            } catch (error) {
                console.error("Initialization error:", error);
                fastingStatusLabel.textContent = "載入失敗";
            }
        }

        // --- Core Functions ---

        function selectMode(mode, save = true) {
            currentMode = mode;
            // Update button styles
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            // Update hidden select for existing logic compatibility if needed elsewhere
            document.getElementById('fasting-mode').value = mode;

            if (isFasting && save) {
                alert("已在斷食中，無法更改模式。請先結束當前斷食。");
                // revert visually
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`.mode-btn[data-mode="${currentMode}"]`).classList.add('active');
                return;
            }
            updateDashboardStats();
        }

        // Removed updateMode() as it's no longer needed with button-based selection

        function updateDashboardStats() {
            document.getElementById('goal-target-display').textContent = `${modes[currentMode].fast} 小時`;

            const now = new Date();
            const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay())); // Sunday
            startOfWeek.setHours(0, 0, 0, 0);

            const weeklySuccess = fastingHistory.filter(h => {
                const end = new Date(h.endTime);
                return end >= startOfWeek && h.metGoal === true;
            }).length;

            document.getElementById('weekly-success-display').textContent = `${weeklySuccess} 次`;
        }

        function startFasting() {
            if (isFasting) return;

            const modeData = modes[currentMode];
            const now = new Date().getTime();

            isFasting = true;
            startTime = now;
            targetEndTime = now + (modeData.fast * 60 * 60 * 1000);

            startTimerUI();
            saveState();
        }

        function stopFasting() {
            if (!isFasting) return;
            if (confirm("確定要在現在結束斷食嗎？")) {
                const now = new Date().getTime();
                const durationMs = now - startTime;
                const durationHrs = durationMs / (1000 * 60 * 60);
                const modeData = modes[currentMode];
                const metGoal = durationHrs >= modeData.fast;

                const record = {
                    date: new Date(startTime).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }),
                    mode: currentMode,
                    startTime: startTime,
                    endTime: now,
                    durationMs: durationMs,
                    metGoal: metGoal
                };

                fastingHistory.unshift(record); // Add to beginning

                isFasting = false;
                startTime = null;
                targetEndTime = null;

                stopTimerUI();
                updateHistoryUI();
                updateDashboardStats();
                await Promise.all([saveHistory(), saveState()]);

                if (metGoal) {
                    alert('🎉 恭喜達成斷食目標！');
                }
            }
        }

        function updateDisplay() {
            if (!isFasting) return;

            const now = new Date().getTime();
            let distance = targetEndTime - now;
            let isOvertime = false;

            if (distance < 0) {
                isOvertime = true;
                distance = Math.abs(distance);
                fastingStatusLabel.textContent = "已達標！超時：";
                fastingStatusLabel.style.color = "var(--success-color)";
                progressRing.style.stroke = "var(--success-color)";
            } else {
                fastingStatusLabel.textContent = "距離目標還有...";
                fastingStatusLabel.style.color = "var(--primary-light)";
                progressRing.style.stroke = "var(--primary-color)";
            }

            const h = Math.floor(distance / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            timerDisplay.textContent =
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            // Calculate Progress (max 100%)
            if (!isOvertime) {
                const totalDuration = targetEndTime - startTime;
                const elapsed = now - startTime;
                const percent = (elapsed / totalDuration) * 100;
                setProgress(Math.min(percent, 100));
            } else {
                setProgress(100); // Keep it full when overtime
            }
        }

        function startTimerUI() {
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            document.querySelectorAll('.mode-btn').forEach(btn => btn.disabled = true);

            const startStr = new Date(startTime).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Taipei' });
            const targetStr = new Date(targetEndTime).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Taipei' });
            timeInfo.innerHTML = `開始: ${startStr} <br> 目標: ${targetStr}`;

            updateDisplay();
            timerInterval = setInterval(updateDisplay, 1000);
        }

        function stopTimerUI() {
            clearInterval(timerInterval);
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            document.querySelectorAll('.mode-btn').forEach(btn => btn.disabled = false);

            timerDisplay.textContent = "00:00:00";
            fastingStatusLabel.textContent = "準備開始";
            fastingStatusLabel.style.color = "var(--primary-light)";
            timeInfo.textContent = "起訖時間";
            setProgress(0);
            progressRing.style.stroke = "var(--primary-color)";
        }

        // --- Helper Functions ---
        function loadData(key) {
            if (key) return Storage.get(key, {});
            return Storage.getFastingData();
        }

        function saveData(key, value) {
            Storage.set(key, value);
            return true;
        }

        function saveState() {
            const state = {
                isFasting: isFasting,
                startTime: startTime,
                targetEndTime: targetEndTime,
                mode: currentMode
            };
            const currentData = loadData();
            currentData.fastingState = state;
            saveData('fastingData', currentData);
        }

        function saveHistory() {
            const currentData = loadData();
            currentData.fastingHistory = fastingHistory;
            saveData('fastingData', currentData);
        }

        function updateHistoryUI() {
            historyTbody.innerHTML = '';

            if (fastingHistory.length === 0) {
                historyTbody.innerHTML = '<li class="history-item"><div style="color: var(--text-muted); text-align: center; width: 100%;">尚無紀錄...</div></li>';
                return;
            }

            fastingHistory.forEach((record, index) => {
                const hours = (record.durationMs / (1000 * 60 * 60)).toFixed(1);
                const isMetDesc = record.metGoal ? '🎉 達標' : '❌ 未達標';

                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <div class="history-date">${record.date} <span style="font-weight: normal; font-size: 0.85em; color: var(--text-muted);">(${record.mode})</span></div>
                    <div class="history-duration">${hours} 小時 <span style="font-size: 0.8em; color: ${record.metGoal ? 'var(--success-color)' : 'var(--danger-color)'}; margin-left:10px;">${isMetDesc}</span></div>
                    <button class="delete-btn" onclick="deleteHistory(${index})" style="background: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 4px 8px; font-size: 0.8em; border-radius: var(--border-radius-sm);">刪除</button>
                `;
                historyTbody.appendChild(li);
            });
        }

        function deleteHistory(index) {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                fastingHistory.splice(index, 1);
                updateHistoryUI();
                updateDashboardStats();
                saveHistory();
            }
        }

        // --- User Actions ---
        // ✅ 實作編輯時間功能
        function editTime() {
            if (!isFasting) {
                alert('請先開始斷食才能編輯時間！');
                return;
            }

            const currentStart = new Date(fastingState.start);
            const defaultDate = getFormattedDate(currentStart);
            const defaultTime = currentStart.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Taipei' });

            const newDateStr = prompt(`請輸入新的斷食開始日期 (YYYY-MM-DD)：`, defaultDate);
            if (newDateStr === null) return; // 取消

            const newTimeStr = prompt(`請輸入新的斷食開始時間 (HH:MM)：`, defaultTime.substring(0, 5));
            if (newTimeStr === null) return; // 取消

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // 1. 驗證日期格式和範圍
            const dateRegex = /^\d{4}-\d{2}-\d{2}$/;
            if (!dateRegex.test(newDateStr)) {
                alert('日期格式錯誤，請使用 YYYY-MM-DD。');
                return;
            }

            // 2. 驗證時間格式
            const timeRegex = /^\d{2}:\d{2}$/;
            if (!timeRegex.test(newTimeStr)) {
                alert('時間格式錯誤，請使用 HH:MM。');
                return;
            }

            const [hourStr, minuteStr] = newTimeStr.split(':');
            const hour = parseInt(hourStr);
            const minute = parseInt(minuteStr);

            if (isNaN(hour) || isNaN(minute) || hour < 0 || hour > 23 || minute < 0 || minute > 59) {
                alert('時間數值無效。');
                return;
            }

            // 3. 計算新的開始時間戳記 (關鍵修正：確保時區和日期一起計算)
            // 使用 ISO 格式，但替換日期和時間部分，並確保以 TW 時區解析
            const [year, month, day] = newDateStr.split('-').map(Number);

            // 核心修正：創建一個 UTC 時間戳，但值是 TW 該日期時間的瞬間
            // month - 1 是因為月份從 0 開始
            const newStart = new Date(year, month - 1, day, hour, minute, 0);

            // 4. 驗證日期是否在未來
            if (newStart.getTime() > now.getTime() + TIME_OFFSET) { // 使用 now.getTime() + offset 作為 TW 的今天
                alert('無法將開始時間設定在未來日期或未來時間！');
                return;
            }

            // 更新狀態
            fastingState.start = newStart.getTime();
            saveState();

            // 強制刷新計時器
            if (isFasting) {
                clearInterval(timerInterval);
                timerInterval = setInterval(updateTimer, 1000);
                updateTimer();
            }
            alert(`斷食開始時間已更新為 ${newDateStr} ${newTimeStr}！`);
        }

        function startFasting() {
            if (isFasting) return;

            // 紀錄斷食開始時間 (使用 UTC 時間戳)
            const now = Date.now();

            fastingState = {
                start: now,
                mode: modeKey,
                status: 'fasting'
            };
            isFasting = true;
            saveState();

            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';

            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
        }

        function stopFasting() {
            if (!isFasting) return;

            clearInterval(timerInterval);
            isFasting = false;

            const end = Date.now();

            // 計算總時長
            const durationMs = end - fastingState.start;
            const totalHours = (durationMs / 3600000).toFixed(1);

            // 新增到歷史紀錄
            historyLog.push({
                date: getFormattedDate(fastingState.start),
                mode: fastingState.mode,
                start: fastingState.start,
                end: end,
                duration: totalHours + ' 小時'
            });

            // 清除當前狀態
            fastingState = {};
            saveState();

            renderHistory();
            resetTimerDisplay();
        }

        function updateMode() {
            modeKey = document.getElementById('fasting-mode').value;
            currentMode = modes[modeKey];
            if (!isFasting) {
                resetTimerDisplay();
            }
        }

        // ✅ Gemini LLM Feature 1: 獲取斷食後建議
        async function getFastingAdvice() {
            adviceBtn.disabled = true;
            adviceOutputEl.innerHTML = '<strong>✨ AI 正在分析您的斷食數據並生成建議...</strong>';

            const lastFast = historyLog.length > 0 ? historyLog[historyLog.length - 1] : null;

            if (!lastFast) {
                adviceOutputEl.innerHTML = '<strong>請先完成一次斷食，才能獲得個性化建議！</strong>';
                adviceBtn.disabled = false;
                return;
            }

            const prompt = `Act as a certified nutritionist and fasting coach. The user just completed an intermittent fasting period. The targeted mode was ${lastFast.mode} (fasting for ${modes[lastFast.mode].fast} hours). The actual total duration recorded was ${lastFast.duration}. Provide a concise, single-paragraph piece of advice (in Traditional Chinese) focused on the best foods to eat to safely break the fast and maximize nutrition, considering the total fasting hours.`;

            const apiKey = "";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ text: "You are a helpful nutritionist providing safe and effective advice." }]
                },
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || '生成建議失敗，請稍後再試。';

                adviceOutputEl.innerHTML = `<strong>✨ 斷食後建議:</strong> ${text}`;

            } catch (error) {
                console.error("Gemini API Error:", error);
                adviceOutputEl.innerHTML = '<strong>✨ AI 服務連線失敗。請檢查網絡或稍後再試。</strong>';
            } finally {
                adviceBtn.disabled = false;
            }
        }

        // ✅ Gemini LLM Feature 2: 獲取斷食策略與激勵
        async function getMotivation() {
            motivationBtn.disabled = true;
            motivationOutputEl.innerHTML = '<strong>✨ AI 正在生成您的今日策略...</strong>';

            const goal = goalInputEl.value.trim();
            if (!goal) {
                motivationOutputEl.innerHTML = '<strong>請在輸入框中填寫您的今日斷食目標！</strong>';
                motivationBtn.disabled = false;
                return;
            }

            const mode = currentMode;
            const prompt = `Act as an encouraging fitness coach. The user is about to start ${mode.fast}:${mode.eat} intermittent fasting. The user's goal for this fast is: "${goal}". Provide a short, encouraging message and 3 specific, simple strategies (in numbered points, in Traditional Chinese) to help them get through the fasting window smoothly, focusing on hydration and mental focus, tailored to their goal.`;

            const apiKey = "";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ text: "You are an encouraging fitness coach. Use Traditional Chinese." }]
                },
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || '生成策略失敗，請稍後再試。';

                motivationOutputEl.innerHTML = `<strong>✨ 斷食策略與激勵:</strong><br>${text.replace(/\n/g, '<br>')}`;
            } catch (error) {
                console.error("Gemini API Error:", error);
                motivationOutputEl.innerHTML = '<strong>✨ AI 服務連線失敗。請檢查網絡或稍後再試。</strong>';
            } finally {
                motivationBtn.disabled = false;
            }
        }


        // --- Persistence ---
        function loadState() {
            const state = loadData('fastingState');
            const history = loadData('fastingHistory');

            if (state && state.start && state.mode) {
                fastingState = state;
                isFasting = true;
                modeKey = state.mode;
                currentMode = modes[modeKey];

                document.getElementById('fasting-mode').value = modeKey;

                // 重新啟動計時器
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                timerInterval = setInterval(updateTimer, 1000);
                updateTimer();
            }

            // 確保 historyLog 永遠是陣列
            if (history) {
                historyLog = Array.isArray(history) ? history : Object.values(history);
                renderHistory();
            }
        }

        function saveState() {
            // 儲存當前狀態和歷史記錄
            saveData('fastingState', fastingState);
            saveData('fastingHistory', historyLog);
        }

        // --- History Rendering ---
        function renderHistory() {
            historyTbody.innerHTML = '';

            // 確保 historyLog 是陣列
            if (!Array.isArray(historyLog) || historyLog.length === 0) {
                historyTbody.innerHTML = '<tr><td colspan="6">尚無紀錄...</td></tr>';
                return;
            }

            // 最新紀錄在前
            [...historyLog].reverse().forEach((log, index) => {
                const row = historyTbody.insertRow();
                const originalIndex = historyLog.length - 1 - index;

                row.innerHTML = `
                <td>${log.date}</td>
                <td>${log.mode}</td>
                <td>${getFormattedTime(log.start)}</td>
                <td>${getFormattedTime(log.end)}</td>
                <td>${log.duration}</td>
                <td><button onclick="deleteHistory(${originalIndex})">刪除</button></td>
            `;
            });
        }

        function deleteHistory(index) {
            if (confirm('確定要刪除這筆歷史紀錄嗎？')) {
                historyLog.splice(index, 1);
                saveData('fastingHistory', historyLog);
                renderHistory();
            }
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            updateMode(); // 初始化模式顯示
        });
    </script>
</body>

</html>
