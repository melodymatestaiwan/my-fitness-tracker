<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲食紀錄 - 個人健身追蹤器</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* Specific tweaks for diet.html */
        .macro-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .macro-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: var(--border-radius-sm);
            text-align: center;
            color: var(--text-primary);
        }

        .macro-item h3 {
            margin-top: 0;
            font-size: 1em;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .macro-item .value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: var(--glow-primary);
        }

        .macro-item .goal {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .progress-bar-container {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            height: 8px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s ease;
        }

        .food-search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .food-search-section input {
            flex-grow: 1;
            min-width: 200px;
        }

        .food-search-section button {
            white-space: nowrap;
        }

        .search-results,
        .favorite-foods-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
        }

        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition-smooth);
        }

        .food-item:last-child {
            border-bottom: none;
        }

        .food-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .food-info {
            flex-grow: 1;
        }

        .food-name {
            font-weight: bold;
            color: var(--text-primary);
        }

        .food-macros {
            font-size: 0.85em;
            color: var(--text-muted);
        }

        .food-item button {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .diet-log-section h3 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-top: 30px;
            color: var(--primary-light);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: transparent;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        th {
            background-color: rgba(0, 0, 0, 0.3);
            font-weight: 600;
            color: var(--primary-color);
        }

        .log-actions button {
            background-color: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 4px 8px;
        }

        .log-actions button:hover {
            background-color: var(--danger-color);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        /* Favorite Icon */
        .fav-icon {
            cursor: pointer;
            color: var(--text-muted);
            margin-left: 8px;
            font-size: 1.2em;
            transition: var(--transition-smooth);
        }

        .fav-icon.active {
            color: #FFC107;
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
        }

        .fav-icon:hover {
            transform: scale(1.2);
        }

        #diet-date {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: var(--border-radius-sm);
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
        }

        #diet-date::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* Make calendar icon visible on dark bg */

        #diet-entry-form {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr 0.8fr 1fr auto auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        #diet-entry-form input,
        #diet-entry-form select {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            height: 40px;
        }

        #diet-entry-form button {
            padding: 8px 15px;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
            height: 40px;
        }

        #add-diet-btn {
            background-color: #4caf50;
        }

        #save-favorite-btn {
            background-color: #2196F3;
        }

        #diet-log-container {
            list-style: none;
            padding: 0;
        }

        .meal-group {
            margin-bottom: 20px;
        }

        .meal-group h4 {
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meal-group h4 .meal-calories {
            font-size: 0.9em;
            font-weight: normal;
            color: #1a237e;
        }

        .log-header {
            font-weight: bold;
            color: #3f51b5;
            font-size: 0.9em;
            padding: 5px 0;
            border-bottom: 2px solid #e0e0e0;
            /* ✅ 新增總計行樣式 */
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px 0;
            text-align: right;
        }

        .log-header span:first-child {
            text-align: left;
        }

        .diet-log-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            text-align: right;
        }

        .diet-log-item:last-child {
            border-bottom: none;
        }

        .diet-log-item span:first-child {
            font-weight: bold;
            text-align: left;
        }

        .delete-diet-btn {
            background-color: #ffcdd2;
            color: #c62828;
            padding: 5px 10px;
            font-size: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            #diet-entry-form {
                grid-template-columns: 1fr 1fr;
            }

            #diet-entry-form #food-name,
            #diet-entry-form #meal-type,
            #diet-entry-form button {
                grid-column: 1 / -1;
            }

            #diet-entry-form button {
                width: 100%;
            }

            .diet-log-item,
            .log-header {
                grid-template-columns: 2.5fr repeat(5, 1fr);
                font-size: 0.9em;
                gap: 8px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-header">
            <h1>飲食紀錄</h1>
        </div>
        <nav>
            <a href="index.html" data-icon="📊">追蹤</a>
            <a href="workout.html" data-icon="💪">課表</a>
            <a href="diet.html" class="active" data-icon="🥗">飲食</a>
            <a href="fasting.html" data-icon="⏱">斷食</a>
            <a href="share.html" data-icon="📤">分享</a>
            <a href="settings.html" data-icon="⚙️">設定</a>
        </nav>
        <div id="page-diet">
            <h2>飲食紀錄</h2>
            <div id="diet-summary">
                <div class="summary-header">
                    <button id="prev-day-btn">‹</button>
                    <div class="title-container">
                        <h3 id="date-title"></h3>
                        <button id="back-to-today-btn">返回今天</button>
                    </div>
                    <button id="next-day-btn">›</button>
                </div>
                <div class="macros-grid" id="macros-grid-container"></div>
            </div>

            <div id="favorite-foods-container">
                <h3>我的常用食物</h3>
                <div id="favorite-foods-list">讀取中...</div>
            </div>

            <div class="search-container">
                <h3>搜尋食物</h3>
                <div class="search-form">
                    <input type="text" id="food-search-input" placeholder="載入資料庫中..." disabled>
                    <button class="local-search-btn" onclick="searchLocalFood()">搜尋在地食物</button>
                    <button class="online-search-btn" onclick="searchOnlineFood()">線上搜尋加工品</button>
                </div>
                <ul class="search-results" id="search-results"></ul>
            </div>

            <h3 id="entry-form-title">新增食物</h3>
            <div id="diet-entry-form">
                <input type="text" id="food-name" placeholder="食物名稱">
                <input type="number" id="protein" placeholder="蛋白質(g)">
                <input type="number" id="carbs" placeholder="碳水(g)">
                <input type="number" id="fat" placeholder="脂肪(g)">
                <input type="number" id="servings" value="1" step="0.1" placeholder="份數">
                <select id="meal-type">
                    <option value="breakfast">早餐</option>
                    <option value="lunch">午餐</option>
                    <option value="dinner">晚餐</option>
                    <option value="snack">點心</option>
                </select>
                <button id="add-diet-btn" onclick="addDietLog()">新增</button>
                <button id="save-favorite-btn" onclick="saveFavoriteFood()">⭐ 存為常用</button>
            </div>
            <h3 id="log-list-title">今日紀錄列表</h3>
            <div id="diet-log-container"></div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
        let foodDatabase = [];
        const dietPlan = {
            monday: { name: "低碳日", protein: 160, carbs: 100, fat: 87 },
            tuesday: { name: "低碳日", protein: 160, carbs: 100, fat: 87 },
            // ✅ 核心修正：對調 週三 和 週四 的飲食計畫
            wednesday: { name: "無碳日", protein: 160, carbs: 40, fat: 98 }, // 原本是高碳日
            thursday: { name: "高碳日", protein: 160, carbs: 230, fat: 51 }, // 原本是無碳日
            // ----------------------------------------------------
            friday: { name: "低碳日", protein: 160, carbs: 100, fat: 87 },
            saturday: { name: "低碳日", protein: 160, carbs: 100, fat: 87 },
            sunday: { name: "無碳日", protein: 160, carbs: 40, fat: 98 },
        };
        const dayKeys = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
        let dietLog = {};
        let favoriteFoods = [];
        let currentDisplayDate = new Date();

        function saveData(key, value) { Storage.set(key, value); }
        function loadData(key) { return Storage.get(key, key === 'favoriteFoods' ? [] : {}); }

        // ✅ 修正時差：採用與時區無關的 YYYY-MM-DD 字串作為日期鍵
        function formatDate(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function addDietLog() {
            const dateKey = formatDate(currentDisplayDate);
            const name = document.getElementById('food-name').value;
            const protein = parseFloat(document.getElementById('protein').value) || 0;
            const carbs = parseFloat(document.getElementById('carbs').value) || 0;
            const fat = parseFloat(document.getElementById('fat').value) || 0;
            const servings = parseFloat(document.getElementById('servings').value) || 1;
            const meal = document.getElementById('meal-type').value;
            if (!name) { alert('請輸入品項名稱！'); return; }
            if (!dietLog[dateKey]) { dietLog[dateKey] = []; }
            dietLog[dateKey].push({ name: `${name} (${(servings * 100).toFixed(0)}g)`, protein: protein * servings, carbs: carbs * servings, fat: fat * servings, meal: meal });
            saveData('dietLog', dietLog);
            renderPageForDate(currentDisplayDate);
            document.getElementById('food-name').value = ''; document.getElementById('protein').value = '';
            document.getElementById('carbs').value = ''; document.getElementById('fat').value = '';
            document.getElementById('servings').value = '1'; document.getElementById('food-name').focus();
        }

        function deleteDietLog(index) {
            const dateKey = formatDate(currentDisplayDate);
            dietLog[dateKey].splice(index, 1);
            saveData('dietLog', dietLog);
            renderPageForDate(currentDisplayDate);
        }

        function saveFavoriteFood() {
            const name = document.getElementById('food-name').value.trim();
            const protein = parseFloat(document.getElementById('protein').value) || 0;
            const carbs = parseFloat(document.getElementById('carbs').value) || 0;
            const fat = parseFloat(document.getElementById('fat').value) || 0;
            if (!name) { alert('請先輸入或搜尋食物名稱！'); return; }
            const existingIndex = favoriteFoods.findIndex(f => f.name === name);
            if (existingIndex > -1) { favoriteFoods[existingIndex] = { name, protein, carbs, fat }; } else { favoriteFoods.push({ name, protein, carbs, fat }); }
            saveData('favoriteFoods', favoriteFoods);
            renderFavoriteFoods();
            alert(`"${name}" 已儲存至常用食物！`);
        }

        function deleteFavoriteFood(index) {
            if (confirm(`確定要從常用清單中刪除 "${favoriteFoods[index].name}" 嗎？`)) {
                favoriteFoods.splice(index, 1);
                saveData('favoriteFoods', favoriteFoods);
                renderFavoriteFoods();
            }
        }

        function renderFavoriteFoods() {
            const listContainer = document.getElementById('favorite-foods-list');
            listContainer.innerHTML = '';
            if (favoriteFoods.length === 0) { listContainer.innerHTML = '尚無常用食物...'; return; }
            favoriteFoods.forEach((food, index) => {
                const btn = document.createElement('button');
                btn.className = 'favorite-item-btn';
                btn.textContent = food.name;
                btn.onclick = () => {
                    document.getElementById('food-name').value = food.name;
                    document.getElementById('protein').value = food.protein;
                    document.getElementById('carbs').value = food.carbs;
                    document.getElementById('fat').value = food.fat;
                    document.getElementById('servings').value = '1';
                };
                const delBtn = document.createElement('span');
                delBtn.className = 'delete-fav-btn';
                delBtn.textContent = 'x';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteFavoriteFood(index); };
                btn.appendChild(delBtn);
                listContainer.appendChild(btn);
            });
        }

        function renderPageForDate(date) {
            renderDietSummary(date);
            renderDietLogList(date);
        }

        function renderDietSummary(date) {
            const dateTitleEl = document.getElementById('date-title');
            const macrosContainer = document.getElementById('macros-grid-container');
            const dateKey = formatDate(date);
            const dayOfWeek = date.getDay();
            const planForDay = dietPlan[dayKeys[dayOfWeek]];
            const todayKey = formatDate(new Date());
            let dateString = `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
            if (dateKey === todayKey) { dateString = "今天"; }
            dateTitleEl.innerHTML = `${dateString} (${planForDay.name})`;
            const logsForDay = dietLog[dateKey] || [];
            const totals = logsForDay.reduce((acc, item) => {
                acc.protein += item.protein;
                acc.carbs += item.carbs;
                acc.fat += item.fat;
                return acc;
            }, { protein: 0, carbs: 0, fat: 0 });
            const currentCalories = (totals.protein * 4) + (totals.carbs * 4) + (totals.fat * 9);
            const targetCalories = (planForDay.protein * 4) + (planForDay.carbs * 4) + (planForDay.fat * 9);
            macrosContainer.innerHTML = `
            ${createMacroItemHTML('蛋白質', totals.protein, planForDay.protein, '克')}
            ${createMacroItemHTML('碳水化合物', totals.carbs, planForDay.carbs, '克')}
            ${createMacroItemHTML('脂肪', totals.fat, planForDay.fat, '克')}
            ${createMacroItemHTML('總熱量', currentCalories, targetCalories, '大卡')}
        `;
        }

        function createMacroItemHTML(name, current, target, unit = '克') { const percentage = target > 0 ? (current / target) * 100 : 0; const isOver = current > target; const displayCurrent = (unit === '大卡') ? Math.round(current) : current.toFixed(1); const displayTarget = (unit === '大卡') ? `~${Math.round(target)}` : target; return `<div class="macro-item"><div class="label">${name} (${unit})</div><div class="values">${displayCurrent} / ${displayTarget}</div><div class="progress-bar"><div class="progress-bar-inner ${isOver ? 'over' : ''}" style="width: ${Math.min(percentage, 100)}%;"></div></div></div>`; }

        function renderDietLogList(date) {
            const container = document.getElementById('diet-log-container');
            const listTitle = document.getElementById('log-list-title');
            const dateKey = formatDate(date);
            const todayKey = formatDate(new Date());
            listTitle.textContent = (dateKey === todayKey) ? "今日紀錄列表" : `${dateKey} 的紀錄列表`;
            container.innerHTML = '';
            const logsForDay = dietLog[dateKey] || [];
            if (logsForDay.length === 0) { container.innerHTML = '尚無紀錄...'; return; }
            const groupedMeals = { breakfast: [], lunch: [], dinner: [], snack: [], uncategorized: [] };
            logsForDay.forEach((item, index) => {
                const itemWithIndex = { ...item, originalIndex: index };
                const mealType = item.meal || 'uncategorized';
                groupedMeals[mealType].push(itemWithIndex);
            });
            const mealOrder = ['breakfast', 'lunch', 'dinner', 'snack', 'uncategorized'];
            const mealNames = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐', snack: '點心', uncategorized: '未分類' };
            let hasContent = false;
            mealOrder.forEach(mealKey => {
                const items = groupedMeals[mealKey];
                if (items.length > 0) {
                    hasContent = true;
                    const mealGroupDiv = document.createElement('div');
                    mealGroupDiv.className = 'meal-group';
                    let mealTotalCalories = 0;

                    // 計算每餐總計
                    const mealTotals = items.reduce((acc, item) => { acc.protein += item.protein; acc.carbs += item.carbs; acc.fat += item.fat; return acc; }, { protein: 0, carbs: 0, fat: 0 });
                    mealTotalCalories = (mealTotals.protein * 4) + (mealTotals.carbs * 4) + (mealTotals.fat * 9);

                    let groupItemsHTML = `
                    <div class="diet-log-item log-header">
                        <span>總計:</span>
                        <span>${mealTotals.protein.toFixed(1)}</span>
                        <span>${mealTotals.carbs.toFixed(1)}</span>
                        <span>${mealTotals.fat.toFixed(1)}</span>
                        <span>${Math.round(mealTotalCalories)}</span>
                        <span></span>
                    </div>
                `;

                    items.forEach(item => {
                        const itemCalories = (item.protein * 4) + (item.carbs * 4) + (item.fat * 9);
                        groupItemsHTML += `
                        <div class="diet-log-item">
                            <span>${item.name}</span>
                            <span>${item.protein.toFixed(1)}</span>
                            <span>${item.carbs.toFixed(1)}</span>
                            <span>${item.fat.toFixed(1)}</span>
                            <span>${itemCalories.toFixed(0)}</span>
                            <button class="delete-diet-btn" onclick="deleteDietLog(${item.originalIndex})">刪除</button>
                        </div>
                    `;
                    });
                    // 修正：將餐別總熱量移到標題
                    mealGroupDiv.innerHTML = `<h4>${mealNames[mealKey]}<span class="meal-calories">總計: ${Math.round(mealTotalCalories)} 大卡</span></h4>` + groupItemsHTML;
                    container.appendChild(mealGroupDiv);
                }
            });
            if (!hasContent) { container.innerHTML = '尚無紀錄...'; }
        }

        function searchLocalFood() {
            const searchInput = document.getElementById('food-search-input');
            if (foodDatabase.length === 0) { alert('在地食物資料庫仍在載入中，請稍候...'); return; }
            const query = searchInput.value.trim();
            if (!query) { return; }
            const results = foodDatabase.filter(food => food.name.includes(query));
            displaySearchResults(results, 'local');
        }

        function searchOnlineFood() {
            const query = document.getElementById('food-search-input').value.trim();
            const resultsList = document.getElementById('search-results');
            if (!query) return;
            // 線上搜尋功能暫時停用（需要後端 API 支援）
            resultsList.innerHTML = '<li>線上搜尋功能目前不可用，請使用本地資料庫搜尋。</li>';
        }

        function displaySearchResults(foods, type) {
            const resultsList = document.getElementById('search-results');
            resultsList.innerHTML = '';
            if (foods.length === 0) { resultsList.innerHTML = '<li>找不到相關食物。</li>'; return; }
            foods.slice(0, 10).forEach(food => {
                const li = document.createElement('li');
                const sourceText = (type === 'local') ? '在地' : '線上';
                li.innerHTML = `<strong>${food.name}</strong><small>[${sourceText}] ${food.protein.toFixed(1)}g P / ${food.carbs.toFixed(1)}g C / ${food.fat.toFixed(1)}g F (每100g)</small>`;
                li.onclick = () => {
                    document.getElementById('food-name').value = food.name;
                    document.getElementById('protein').value = food.protein.toFixed(1);
                    document.getElementById('carbs').value = food.carbs.toFixed(1);
                    document.getElementById('fat').value = food.fat.toFixed(1);
                    document.getElementById('servings').value = '1';
                    resultsList.innerHTML = '';
                };
                resultsList.appendChild(li);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('food-search-input');

            document.getElementById('prev-day-btn').onclick = () => {
                const newDate = new Date(currentDisplayDate);
                newDate.setDate(currentDisplayDate.getDate() - 1);
                currentDisplayDate = newDate;
                renderPageForDate(currentDisplayDate);
            };
            document.getElementById('next-day-btn').onclick = () => {
                const newDate = new Date(currentDisplayDate);
                newDate.setDate(currentDisplayDate.getDate() + 1);
                currentDisplayDate = newDate;
                renderPageForDate(currentDisplayDate);
            };
            document.getElementById('back-to-today-btn').onclick = () => {
                currentDisplayDate = new Date();
                renderPageForDate(currentDisplayDate);
            };

            // 從本地儲存載入資料
            dietLog = loadData('dietLog');
            favoriteFoods = loadData('favoriteFoods');

            // 載入食物資料庫
            fetch('tfda_db.json').then(res => res.json()).then(data => {
                foodDatabase = data;
                searchInput.placeholder = '輸入食物關鍵字...';
                searchInput.disabled = false;
            }).catch(err => {
                console.error('Failed to load food database:', err);
                searchInput.placeholder = '在地資料庫載入失敗';
            });

            renderPageForDate(currentDisplayDate);
            renderFavoriteFoods();
        });
    </script>
</body>

</html>
