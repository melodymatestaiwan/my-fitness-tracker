<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據追蹤 - 個人健身追蹤器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* === Challenge Progress === */
        .challenge-banner {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            margin-bottom: var(--space-5);
        }

        .challenge-banner h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--space-3);
            letter-spacing: 0;
            text-transform: none;
        }

        .challenge-hero {
            display: flex;
            align-items: baseline;
            gap: var(--space-2);
            margin-bottom: var(--space-4);
        }

        .challenge-hero .day-num {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            color: var(--accent);
        }

        .challenge-hero .day-total {
            font-size: 1.125rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .progress-track {
            position: relative;
            background: var(--bg-elevated);
            border-radius: var(--radius-full);
            height: 6px;
            overflow: visible;
        }

        .progress-fill {
            height: 100%;
            border-radius: var(--radius-full);
            background: linear-gradient(90deg, var(--accent), var(--success));
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            background: var(--accent);
            border: 3px solid var(--bg-primary);
            border-radius: 50%;
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.5);
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            margin-top: var(--space-3);
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }

        .progress-meta .current {
            color: var(--accent);
            font-weight: 600;
        }

        /* === Stats Grid === */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }

        .stat-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            text-align: center;
        }

        .stat-block .stat-num {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            line-height: 1.1;
        }

        .stat-block .stat-label {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .stat-block .stat-sub {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .stat-sub.positive { color: var(--success); }
        .stat-sub.negative { color: var(--danger); }

        /* === Data Entry === */
        .entry-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            margin-bottom: var(--space-6);
        }

        .entry-card h2 {
            margin-bottom: var(--space-4);
        }

        .form-row {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 100px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: var(--space-2);
        }

        .time-toggle {
            display: flex;
            background: var(--bg-elevated);
            border-radius: var(--radius-full);
            padding: 3px;
            gap: 2px;
        }

        .time-toggle label {
            flex: 1;
            text-align: center;
            padding: 8px 12px;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-tertiary);
            transition: all var(--transition-fast);
        }

        .time-toggle input[type="radio"] {
            display: none;
        }

        .time-toggle input[type="radio"]:checked + span {
            background: var(--accent);
            color: var(--text-on-accent);
            border-radius: var(--radius-full);
            display: block;
            padding: 8px 12px;
            margin: -8px -12px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: var(--space-4);
        }

        /* === Chart Section === */
        .chart-section {
            margin-bottom: var(--space-8);
        }

        .chart-tabs {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-5);
        }

        .chart-tabs button {
            background: var(--bg-card);
            color: var(--text-tertiary);
            border: 1px solid var(--border);
            font-size: 0.8125rem;
            padding: var(--space-2) var(--space-4);
        }

        .chart-tabs button.active {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .chart-tabs button:hover:not(.active) {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            box-shadow: none;
            transform: none;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .chart-card h3 {
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: var(--space-3);
        }

        /* === Raw Data Table === */
        .data-table-wrap {
            max-height: 350px;
            overflow-y: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        .data-table th,
        .data-table td {
            padding: var(--space-3);
            text-align: left;
            border-bottom: 1px solid var(--border-light);
        }

        .data-table th {
            background: var(--bg-secondary);
            color: var(--text-tertiary);
            font-weight: 600;
            font-size: 0.6875rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .data-table td {
            color: var(--text-secondary);
        }

        .data-table tr:hover td {
            background: var(--bg-card);
        }

        .data-table .actions {
            display: flex;
            gap: 4px;
        }

        .data-table .actions button {
            font-size: 0.6875rem;
            padding: 4px 8px;
        }

        .delete-btn {
            background: var(--danger-muted) !important;
            color: var(--danger) !important;
        }
        .delete-btn:hover {
            background: var(--danger) !important;
            color: #fff !important;
            box-shadow: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-header">
            <h1>數據追蹤</h1>
        </div>

        <nav>
            <a href="index.html" class="active" data-icon="📊">追蹤</a>
            <a href="workout.html" data-icon="💪">課表</a>
            <a href="diet.html" data-icon="🥗">飲食</a>
            <a href="fasting.html" data-icon="⏱">斷食</a>
            <a href="share.html" data-icon="📤">分享</a>
            <a href="settings.html" data-icon="⚙️">設定</a>
        </nav>

        <!-- Challenge Progress -->
        <div id="countdown-container" class="challenge-banner"></div>

        <!-- Stats -->
        <div id="coach-dashboard" class="stats-row">
            <div class="stat-block">
                <div class="stat-label">當前體重</div>
                <div id="dash-weight" class="stat-num">--</div>
                <div id="dash-weight-trend" class="stat-sub">近7日: --</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">BMI</div>
                <div id="dash-bmi" class="stat-num">--</div>
                <div id="dash-bmi-status" class="stat-sub">--</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">基礎代謝</div>
                <div id="dash-bmr" class="stat-num">--</div>
                <div id="dash-bmr-coach" class="stat-sub">--</div>
            </div>
        </div>

        <!-- Data Entry -->
        <div class="entry-card">
            <h2>新增紀錄</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="entry-date">日期</label>
                    <input type="date" id="entry-date">
                </div>
                <div class="form-group">
                    <label>時段</label>
                    <div class="time-toggle">
                        <label><input type="radio" name="time-of-day" value="morning" checked><span>早上</span></label>
                        <label><input type="radio" name="time-of-day" value="evening"><span>晚上</span></label>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="weight">體重 (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="75.5">
                </div>
                <div class="form-group">
                    <label for="bodyfat">體脂 (%)</label>
                    <input type="number" id="bodyfat" step="0.1" placeholder="18.5">
                </div>
                <div class="form-group">
                    <label for="muscle-mass">骨骼肌 (kg)</label>
                    <input type="number" id="muscle-mass" step="0.1" placeholder="35.0">
                </div>
            </div>
            <div class="form-actions">
                <button onclick="addData()">儲存紀錄</button>
            </div>
        </div>

        <!-- Charts -->
        <div class="chart-section">
            <div class="chart-tabs" id="chart-controls">
                <button id="btn-daily" class="active" onclick="renderAllCharts('daily')">日</button>
                <button id="btn-weekly" onclick="renderAllCharts('weekly')">週</button>
                <button id="btn-monthly" onclick="renderAllCharts('monthly')">月</button>
            </div>
            <div class="chart-card">
                <h3>體重趨勢</h3>
                <canvas id="weightChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>體脂趨勢</h3>
                <canvas id="bodyfatChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>骨骼肌趨勢</h3>
                <canvas id="muscleMassChart"></canvas>
            </div>
        </div>

        <!-- Raw Data -->
        <div class="section">
            <h2>歷史紀錄</h2>
            <div class="data-table-wrap">
                <table class="data-table" id="raw-data-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>時段</th>
                            <th>體重</th>
                            <th>體脂</th>
                            <th>骨骼肌</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
        // 從設定讀取計畫參數
        const settings = Storage.getSettings();
        const CHALLENGE_TOTAL_DAYS = settings.challengeDays;
        const CHALLENGE_START_DATE_STRING = settings.challengeStartDate + 'T00:00:00';
        const CHALLENGE_START_DATE = new Date(CHALLENGE_START_DATE_STRING);
        const START_WEIGHT = settings.startWeight;
        const TARGET_WEIGHT = settings.targetWeight;

        let myCharts = {};
        let fitnessData = [];

        function getFormattedDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // ---------------------- 資料存取與處理 ----------------------

        function loadFitnessData() {
            return Storage.getFitnessData();
        }

        function saveFitnessData() {
            Storage.saveFitnessData(fitnessData);
        }

        function addData() {
            const date = document.getElementById('entry-date').value;
            const time = document.querySelector('input[name="time-of-day"]:checked').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const bodyfat = parseFloat(document.getElementById('bodyfat').value);
            const muscleMass = parseFloat(document.getElementById('muscle-mass').value);

            if (!date || (isNaN(weight) && isNaN(bodyfat) && isNaN(muscleMass))) {
                alert('請至少輸入日期和一項數據！');
                return;
            }

            const lastInputs = { weight, bodyfat, muscleMass };
            localStorage.setItem('lastFitnessInputs', JSON.stringify(lastInputs));

            const newData = {
                date, time,
                weight: isNaN(weight) ? null : weight,
                bodyfat: isNaN(bodyfat) ? null : bodyfat,
                muscleMass: isNaN(muscleMass) ? null : muscleMass,
                timestamp: new Date().toISOString()
            };

            const existingIndex = fitnessData.findIndex(item => item.date === date && item.time === time);
            if (existingIndex > -1) {
                newData.timestamp = fitnessData[existingIndex].timestamp;
                fitnessData[existingIndex] = newData;
            } else {
                fitnessData.push(newData);
            }

            fitnessData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            saveFitnessData();
            alert('紀錄新增成功！');
            init();
        }

        function deleteData(timestamp) {
            if (!confirm('確定要刪除這筆紀錄嗎？')) return;
            const initialLength = fitnessData.length;
            fitnessData = fitnessData.filter(item => item.timestamp !== timestamp);
            if (fitnessData.length < initialLength) {
                saveFitnessData();
                alert('紀錄刪除成功！');
                init();
            } else {
                alert('找不到該紀錄。');
            }
        }

        function editRawData(timestamp) {
            const entry = fitnessData.find(d => d.timestamp === timestamp);
            if (!entry) { alert("找不到該紀錄"); return; }

            const newWeight = prompt("請輸入新的體重 (kg):", entry.weight);
            const newBodyfat = prompt("請輸入新的體脂 (%):", entry.bodyfat);
            const newMuscleMass = prompt("請輸入新的骨骼肌 (kg):", entry.muscleMass);

            const weight = parseFloat(newWeight);
            const bodyfat = parseFloat(newBodyfat);
            const muscleMass = parseFloat(newMuscleMass);

            if (isNaN(weight) || isNaN(bodyfat) || isNaN(muscleMass)) {
                alert("輸入無效，操作已取消。");
                return;
            }

            entry.weight = weight;
            entry.bodyfat = bodyfat;
            entry.muscleMass = muscleMass;
            saveFitnessData();
            init();
        }

        // ---------------------- 數據統計與分析 ----------------------

        function calculateAnalytics() {
            if (fitnessData.length === 0) return;

            const latest = fitnessData[fitnessData.length - 1];
            if (!latest.weight) return;

            document.getElementById('dash-weight').textContent = latest.weight.toFixed(1);

            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            const recentData = fitnessData.filter(d => new Date(d.date) >= sevenDaysAgo && d.weight !== null);

            const trendEl = document.getElementById('dash-weight-trend');
            if (recentData.length >= 2) {
                const firstWeight = recentData[0].weight;
                const diff = latest.weight - firstWeight;
                const sign = diff >= 0 ? '+' : '';
                trendEl.textContent = `7日 ${sign}${diff.toFixed(1)} kg`;
                trendEl.className = `stat-sub ${diff <= 0 ? 'positive' : 'negative'}`;
            } else {
                trendEl.textContent = '數據不足';
            }

            const HEIGHT_CM = settings.heightCm;
            const bmi = latest.weight / ((HEIGHT_CM / 100) ** 2);
            document.getElementById('dash-bmi').textContent = bmi.toFixed(1);

            let status = '正常';
            if (bmi < 18.5) status = '過輕';
            else if (bmi >= 24 && bmi < 27) status = '過重';
            else if (bmi >= 27) status = '肥胖';
            document.getElementById('dash-bmi-status').textContent = status;

            const currentYear = new Date().getFullYear();
            const AGE = currentYear - (settings.birthYear || 1994);
            const genderOffset = settings.gender === 'female' ? -161 : 5;
            const bmr = (10 * latest.weight) + (6.25 * HEIGHT_CM) - (5 * AGE) + genderOffset;
            document.getElementById('dash-bmr').textContent = Math.round(bmr);

            const coachEl = document.getElementById('dash-bmr-coach');
            if (status === '正常') coachEl.textContent = 'kcal / 維持蛋白';
            else if (status === '過重' || status === '肥胖') coachEl.textContent = 'kcal / 製造缺口';
            else coachEl.textContent = 'kcal / 增加攝取';
        }

        // ---------------------- 數據統計與分組 ----------------------

        function aggregateData(data, mode) {
            if (data.length === 0) return { labels: [], morning: {}, evening: {} };
            const groups = {};
            data.forEach(item => {
                const itemDate = new Date(item.date + 'T00:00:00');
                let groupKey;
                if (mode === 'daily') {
                    groupKey = item.date;
                } else if (mode === 'weekly') {
                    const day = itemDate.getDay();
                    const diff = itemDate.getDate() - day + (day === 0 ? -6 : 1);
                    const weekStart = new Date(itemDate.setDate(diff));
                    groupKey = getFormattedDate(weekStart);
                } else if (mode === 'monthly') {
                    groupKey = `${itemDate.getFullYear()}-${String(itemDate.getMonth() + 1).padStart(2, '0')}-01`;
                }
                if (!groups[groupKey]) {
                    groups[groupKey] = { weightM: [], bodyfatM: [], muscleMassM: [], weightE: [], bodyfatE: [], muscleMassE: [] };
                }
                const suffix = item.time === 'morning' ? 'M' : 'E';
                if (item.weight !== null) groups[groupKey][`weight${suffix}`].push(item.weight);
                if (item.bodyfat !== null) groups[groupKey][`bodyfat${suffix}`].push(item.bodyfat);
                if (item.muscleMass !== null) groups[groupKey][`muscleMass${suffix}`].push(item.muscleMass);
            });
            const sortedKeys = Object.keys(groups).sort();
            const result = { labels: sortedKeys, morning: {}, evening: {} };
            const getAverage = (arr) => arr.length > 0 ? arr.reduce((a, b) => a + b) / arr.length : null;
            ['weight', 'bodyfat', 'muscleMass'].forEach(key => {
                result.morning[key] = sortedKeys.map(k => getAverage(groups[k][`${key}M`]));
                result.evening[key] = sortedKeys.map(k => getAverage(groups[k][`${key}E`]));
            });
            return result;
        }

        // ---------------------- 圖表渲染 ----------------------

        function createChart(canvasId, yAxisLabel, morningData, eveningData, labels, timeUnit) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (myCharts[canvasId]) { myCharts[canvasId].destroy(); }

            const MORNING_COLOR = '#C7F860';
            const EVENING_COLOR = '#34D399';

            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '早上',
                            data: morningData,
                            borderColor: MORNING_COLOR,
                            backgroundColor: 'rgba(199, 248, 96, 0.05)',
                            pointBackgroundColor: '#000',
                            pointBorderColor: MORNING_COLOR,
                            pointBorderWidth: 2,
                            borderWidth: 2,
                            tension: 0.4,
                            pointRadius: 3,
                            pointHoverRadius: 5,
                            fill: true,
                            segment: { borderColor: ctx => ctx.p0.parsed.y === null || ctx.p1.parsed.y === null ? 'transparent' : MORNING_COLOR }
                        },
                        {
                            label: '晚上',
                            data: eveningData,
                            borderColor: EVENING_COLOR,
                            backgroundColor: 'transparent',
                            pointBackgroundColor: '#000',
                            pointBorderColor: EVENING_COLOR,
                            pointBorderWidth: 2,
                            borderWidth: 2,
                            tension: 0.4,
                            pointRadius: 3,
                            pointHoverRadius: 5,
                            segment: { borderColor: ctx => ctx.p0.parsed.y === null || ctx.p1.parsed.y === null ? 'transparent' : EVENING_COLOR }
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        title: { display: false },
                        legend: {
                            labels: {
                                color: '#666',
                                font: { family: 'Inter', size: 11 },
                                boxWidth: 12,
                                padding: 16
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: timeUnit, tooltipFormat: 'yyyy-MM-dd', displayFormats: { day: 'MM/dd', week: 'MM/dd', month: 'yyyy/MM' } },
                            grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
                            ticks: { color: '#444', font: { family: 'Inter', size: 10 } },
                            border: { display: false }
                        },
                        y: {
                            position: 'left',
                            grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
                            ticks: { color: '#444', font: { family: 'Inter', size: 10 } },
                            border: { display: false }
                        }
                    }
                }
            });
        }

        function renderAllCharts(mode) {
            document.querySelectorAll('#chart-controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            if (myCharts['weightChart']) myCharts['weightChart'].destroy();
            if (myCharts['bodyfatChart']) myCharts['bodyfatChart'].destroy();
            if (myCharts['muscleMassChart']) myCharts['muscleMassChart'].destroy();

            const aggregated = aggregateData(fitnessData, mode);
            const unit = mode === 'daily' ? 'day' : (mode === 'weekly' ? 'week' : 'month');

            myCharts['weightChart'] = createChart('weightChart', '體重 (kg)', aggregated.morning.weight, aggregated.evening.weight, aggregated.labels, unit);
            myCharts['bodyfatChart'] = createChart('bodyfatChart', '體脂 (%)', aggregated.morning.bodyfat, aggregated.evening.bodyfat, aggregated.labels, unit);
            myCharts['muscleMassChart'] = createChart('muscleMassChart', '骨骼肌 (kg)', aggregated.morning.muscleMass, aggregated.evening.muscleMass, aggregated.labels, unit);
        }

        // ---------------------- 倒數計時器 ----------------------

        function updateCountdown() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const start = new Date(CHALLENGE_START_DATE.getTime() - (CHALLENGE_START_DATE.getTimezoneOffset() * 60000));
            start.setHours(0, 0, 0, 0);

            const diffDays = Math.floor((today.getTime() - start.getTime()) / (1000 * 60 * 60 * 24));
            const currentDay = Math.max(1, diffDays + 1);
            const remainingDays = CHALLENGE_TOTAL_DAYS - currentDay;
            const progressPercent = Math.min(100, (currentDay / CHALLENGE_TOTAL_DAYS) * 100);

            const lastWeight = fitnessData.length > 0 ? fitnessData[fitnessData.length - 1].weight : START_WEIGHT;
            const totalLossNeeded = START_WEIGHT - TARGET_WEIGHT;
            const lossSoFar = START_WEIGHT - lastWeight;
            let weightProgress = totalLossNeeded > 0 ? (lossSoFar / totalLossNeeded) * 100 : (lastWeight <= TARGET_WEIGHT ? 100 : 0);
            weightProgress = Math.max(0, Math.min(100, weightProgress));

            let statusHtml = '';
            if (remainingDays < 0) {
                statusHtml = `<span style="color: var(--success);">挑戰完成！超額 ${Math.abs(remainingDays)} 天</span>`;
            } else if (remainingDays === 0) {
                statusHtml = `<span style="color: var(--warm);">最後一天！</span>`;
            } else {
                statusHtml = `剩餘 ${remainingDays} 天`;
            }

            document.getElementById('countdown-container').innerHTML = `
                <h2>${CHALLENGE_TOTAL_DAYS} 天減脂挑戰</h2>
                <div class="challenge-hero">
                    <span class="day-num">DAY ${Math.min(currentDay, CHALLENGE_TOTAL_DAYS)}</span>
                    <span class="day-total">/ ${CHALLENGE_TOTAL_DAYS}</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                    <div class="progress-marker" style="left: ${weightProgress}%;"></div>
                </div>
                <div class="progress-meta">
                    <span class="current">${lastWeight.toFixed(1)} kg</span>
                    <span>${statusHtml}</span>
                    <span>目標 ${TARGET_WEIGHT.toFixed(1)} kg</span>
                </div>
            `;
        }

        // ---------------------- 原始數據表格 ----------------------

        function renderRawDataTable() {
            const tbody = document.querySelector('#raw-data-table tbody');
            tbody.innerHTML = '';

            [...fitnessData].reverse().forEach(item => {
                const row = tbody.insertRow();
                const timeDisplay = item.time === 'morning' ? '早' : '晚';

                row.insertCell().textContent = item.date;
                row.insertCell().textContent = timeDisplay;
                row.insertCell().textContent = item.weight !== null ? item.weight.toFixed(1) : '-';
                row.insertCell().textContent = item.bodyfat !== null ? item.bodyfat.toFixed(1) : '-';
                row.insertCell().textContent = item.muscleMass !== null ? item.muscleMass.toFixed(1) : '-';

                const actionCell = row.insertCell();
                actionCell.className = 'actions';
                const editBtn = document.createElement('button');
                editBtn.className = 'btn-secondary btn-sm';
                editBtn.textContent = '編輯';
                editBtn.onclick = () => editRawData(item.timestamp);
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn btn-sm';
                deleteBtn.textContent = '刪除';
                deleteBtn.onclick = () => deleteData(item.timestamp);
                actionCell.appendChild(editBtn);
                actionCell.appendChild(deleteBtn);
            });
        }

        // ---------------------- 初始化 ----------------------

        function init() {
            if (!Storage.hasCompletedSetup()) {
                window.location.href = 'settings.html';
                return;
            }

            fitnessData = loadFitnessData();

            const lastInputs = JSON.parse(localStorage.getItem('lastFitnessInputs'));
            if (lastInputs) {
                document.getElementById('weight').value = lastInputs.weight || '';
                document.getElementById('bodyfat').value = lastInputs.bodyfat || '';
                document.getElementById('muscle-mass').value = lastInputs.muscleMass || '';
            }

            document.getElementById('entry-date').value = getFormattedDate(new Date());

            updateCountdown();
            calculateAnalytics();
            renderRawDataTable();
            renderAllCharts('daily');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
